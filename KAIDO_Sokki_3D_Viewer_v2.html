<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KAIDO · Sokki · 3D Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'IBM Plex Mono', monospace;
    user-select: none;
    overflow: hidden;
  }

  .scanlines {
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  .ambient {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 800px; height: 800px;
    background: radial-gradient(ellipse at center,
      rgba(201,40,45,0.06) 0%,
      rgba(201,168,76,0.02) 40%,
      transparent 70%
    );
    pointer-events: none;
    animation: breathe 4s ease-in-out infinite;
  }

  @keyframes breathe {
    0%, 100% { opacity: 0.6; transform: translate(-50%,-50%) scale(1); }
    50% { opacity: 1; transform: translate(-50%,-50%) scale(1.05); }
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
    z-index: 10;
  }

  .brand {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 18px;
    color: #fff;
    line-height: 1;
  }

  .rule {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px auto;
    width: 280px;
  }
  .rule-line {
    flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, #c9a84c55);
  }
  .rule-line.r { background: linear-gradient(270deg, transparent, #c9a84c55); }

  .sub {
    font-size: 8px;
    letter-spacing: 5px;
    color: #c9a84c;
    text-transform: uppercase;
  }

  /* 3D Viewer */
  .viewer {
    position: relative;
    width: 420px;
    height: 520px;
    perspective: 1400px;
    cursor: grab;
    z-index: 10;
  }

  .viewer:active { cursor: grabbing; }

  /* The hoodie itself — no box, no border, pure image floating */
  .hoodie {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transform: rotateY(0deg);
  }

  .hoodie-face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }

  .hoodie-face img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
    /* No background bleed — image has black bg matching page */
    mix-blend-mode: lighten;
  }

  .hoodie-face-back {
    transform: rotateY(180deg);
  }

  /* Floating shadow beneath hoodie */
  .shadow {
    position: absolute;
    bottom: -30px;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    height: 20px;
    background: radial-gradient(ellipse, rgba(201,40,45,0.15) 0%, transparent 70%);
    filter: blur(8px);
    pointer-events: none;
    transition: width 0.3s;
  }

  /* Side labels that appear at edges */
  .edge-label {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 8px;
    letter-spacing: 3px;
    color: #2a2520;
    text-transform: uppercase;
    transition: color 0.4s, opacity 0.4s;
    pointer-events: none;
  }

  .edge-label.left { left: -50px; text-align: right; }
  .edge-label.right { right: -50px; }
  .edge-label.visible { color: #c9a84c; }

  /* Bottom info */
  .info {
    text-align: center;
    margin-top: 20px;
    position: relative;
    z-index: 10;
  }

  .product-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 7px;
    color: #e8e4dc;
  }

  .product-detail {
    font-size: 8px;
    letter-spacing: 3px;
    color: #3a3530;
    margin-top: 4px;
    text-transform: uppercase;
  }

  .price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 5px;
    color: #c9282d;
    margin-top: 6px;
  }

  /* Drag hint */
  .hint {
    margin-top: 14px;
    font-size: 8px;
    letter-spacing: 4px;
    color: #2a2520;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    transition: opacity 1s;
  }

  .hint-arrow {
    animation: pulse 2s ease-in-out infinite;
  }

  .hint.gone { opacity: 0; pointer-events: none; }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* Auto toggle */
  .controls {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-top: 12px;
    position: relative;
    z-index: 10;
  }

  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
  }

  .toggle-track {
    width: 32px; height: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    position: relative;
    transition: background 0.3s;
  }

  .toggle-track.on {
    background: rgba(201,40,45,0.2);
    border-color: rgba(201,40,45,0.5);
  }

  .toggle-thumb {
    position: absolute;
    top: 2px; left: 2px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #3a3530;
    transition: transform 0.3s, background 0.3s;
  }

  .toggle-track.on .toggle-thumb {
    transform: translateX(16px);
    background: #c9282d;
    box-shadow: 0 0 6px #c9282d;
  }

  .toggle-label {
    font-size: 8px;
    letter-spacing: 3px;
    color: #3a3530;
    text-transform: uppercase;
    transition: color 0.3s;
  }

  .toggle-track.on + .toggle-label {
    color: #c9282d;
  }

  .speed-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .speed-label {
    font-size: 8px;
    letter-spacing: 2px;
    color: #2a2520;
    text-transform: uppercase;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 80px;
    height: 2px;
    background: rgba(255,255,255,0.08);
    outline: none;
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #c9a84c;
    cursor: pointer;
  }
</style>
</head>

  <div class="shadow" id="shadow"></div>
  <div class="edge-label left" id="lblLeft">Back</div>
  <div class="edge-label right" id="lblRight">Back</div>
</div>

<div class="info">
  <div class="product-name">Sokki Hoodie — Washed Black</div>
  <div class="product-detail">500 GSM · Oni Mask Series · Garment-Washed · Limited Run</div>
  <div class="price">$175.00 CAD</div>
</div>

<div class="hint" id="hint">
  <span class="hint-arrow">←</span>
  <span>drag to rotate</span>
  <span class="hint-arrow">→</span>
</div>

<div class="controls">
  <div class="toggle" onclick="toggleAuto()">
    <div class="toggle-track" id="toggleTrack">
      <div class="toggle-thumb"></div>
    </div>
    <span class="toggle-label" id="toggleLabel">Auto Rotate</span>
  </div>
  <div class="speed-wrap">
    <span class="speed-label">Speed</span>
    <input type="range" id="speedSlider" min="1" max="10" value="3" oninput="updateSpeed(this.value)">
  </div>
</div>

<script>
  const hoodie = document.getElementById('hoodie');
  const viewer = document.getElementById('viewer');
  const hint = document.getElementById('hint');
  const shadow = document.getElementById('shadow');
  const lblLeft = document.getElementById('lblLeft');
  const lblRight = document.getElementById('lblRight');
  const toggleTrack = document.getElementById('toggleTrack');
  const toggleLabel = document.getElementById('toggleLabel');

  let rotY = 0;
  let isDragging = false;
  let lastX = 0;
  let velocity = 0;
  let autoOn = false;
  let autoSpeed = 0.6;
  let hintGone = false;
  let rafMomentum = null;
  let rafAuto = null;

  function applyRot(deg) {
    rotY = deg;
    hoodie.style.transform = `rotateY(${deg}deg)`;

    // Shadow breathing with rotation
    const norm = ((deg % 360) + 360) % 360;
    const mid = norm > 180 ? 360 - norm : norm;
    const pct = mid / 180;
    shadow.style.width = (120 + pct * 100) + 'px';
    shadow.style.opacity = 0.4 + pct * 0.6;

    // Edge labels
    const isFront = norm < 90 || norm > 270;
    const nearEdge = (norm > 75 && norm < 105) || (norm > 255 && norm < 285);
    lblLeft.textContent = isFront ? 'Back' : 'Front';
    lblRight.textContent = isFront ? 'Back' : 'Front';
    lblLeft.classList.toggle('visible', nearEdge);
    lblRight.classList.toggle('visible', nearEdge);
  }

  // Mouse
  viewer.addEventListener('mousedown', e => {
    isDragging = true;
    lastX = e.clientX;
    velocity = 0;
    cancelAnimationFrame(rafMomentum);
    hideHint();
    stopAuto();
    e.preventDefault();
  });

  window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const dx = e.clientX - lastX;
    velocity = dx * 0.45;
    applyRot(rotY + dx * 0.45);
    lastX = e.clientX;
  });

  window.addEventListener('mouseup', () => {
    if (!isDragging) return;
    isDragging = false;
    momentum();
  });

  // Touch
  viewer.addEventListener('touchstart', e => {
    isDragging = true;
    lastX = e.touches[0].clientX;
    velocity = 0;
    cancelAnimationFrame(rafMomentum);
    hideHint();
    stopAuto();
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchmove', e => {
    if (!isDragging) return;
    const dx = e.touches[0].clientX - lastX;
    velocity = dx * 0.45;
    applyRot(rotY + dx * 0.45);
    lastX = e.touches[0].clientX;
    e.preventDefault();
  }, { passive: false });

  window.addEventListener('touchend', () => {
    if (!isDragging) return;
    isDragging = false;
    momentum();
  });

  function momentum() {
    if (Math.abs(velocity) < 0.08) return;
    velocity *= 0.92;
    applyRot(rotY + velocity);
    rafMomentum = requestAnimationFrame(momentum);
  }

  function hideHint() {
    if (hintGone) return;
    hint.classList.add('gone');
    hintGone = true;
  }

  // Auto rotate
  function toggleAuto() {
    autoOn = !autoOn;
    toggleTrack.classList.toggle('on', autoOn);
    toggleLabel.style.color = autoOn ? '#c9282d' : '#2a2520';
    if (autoOn) runAuto();
    else stopAuto();
  }

  function runAuto() {
    if (!autoOn || isDragging) { rafAuto = requestAnimationFrame(runAuto); return; }
    applyRot(rotY + autoSpeed);
    rafAuto = requestAnimationFrame(runAuto);
  }

  function stopAuto() {
    autoOn = false;
    toggleTrack.classList.remove('on');
    toggleLabel.style.color = '#2a2520';
    cancelAnimationFrame(rafAuto);
  }

  function updateSpeed(val) {
    autoSpeed = val * 0.25;
  }

  // Init subtle float
  applyRot(0);
</script>

</body>
